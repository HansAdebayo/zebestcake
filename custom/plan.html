<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnalisation — ZeBest Custom</title>
    <meta name="description" content="Configurez votre objet personnalisé sur-mesure.">
    <link rel="stylesheet" href="css/custom.css?v=11">
    <style>
        /* ===== PAGE PLAN — MOBILE FIRST ===== */

        /* La structure HTML est statique : image + section côte à côte sur desktop,
           empilées sur mobile. Le JS ne touche QUE le contenu, pas le layout. */

        .plan-page {
            min-height: 100vh;
        }

        /* --- IMAGE : pleine largeur, hauteur fixe sur mobile --- */
        .plan-photo-wrap {
            width: 100%;
            /* Pousse vers le bas de la navbar fixe */
            padding-top: 56px;
        }

        #cfg-photo {
            display: block;
            width: 100%;
            height: 60vw;
            max-height: 380px;
            object-fit: cover;
            object-position: center;
        }

        /* Miniatures */
        .plan-thumbs {
            display: flex;
            gap: 8px;
            padding: 8px 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .plan-thumb {
            flex-shrink: 0;
            width: 56px;
            height: 56px;
            border: 2px solid transparent;
            cursor: pointer;
            background: none;
            padding: 0;
            overflow: hidden;
        }

        .plan-thumb.active {
            border-color: var(--terracotta, #C8553D);
        }

        .plan-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* --- FORMULAIRE : bloc normal sous l'image --- */
        .plan-form-wrap {
            padding: 1.5rem 1.25rem 5rem;
        }

        /* --- DESKTOP ≥ 1024px : 2 colonnes --- */
        @media (min-width: 1024px) {
            .plan-page {
                display: grid;
                grid-template-columns: 1fr 1fr;
                min-height: 100vh;
            }

            .plan-photo-wrap {
                padding-top: 0;
                position: sticky;
                top: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }

            #cfg-photo {
                flex: 1;
                height: 0; /* flex enfant : prend tout l'espace dispo */
                max-height: none;
                object-fit: cover;
            }

            .plan-thumbs {
                flex-shrink: 0;
                padding: 10px 12px;
                background: var(--creme, #F5EFE6);
            }

            .plan-form-wrap {
                padding: 8rem 3rem 6rem;
                overflow-y: auto;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">ZeBest <em>Custom</em></a>
            <a href="commander.html" class="nav-cart" id="nav-cart" aria-label="Voir mon panier">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <path d="M16 10a4 4 0 01-8 0"/>
                </svg>
                <span class="cart-count" id="cart-count" data-count="0">0</span>
            </a>
        </nav>
    </header>

    <main class="plan-page">

        <!-- Colonne image — structure statique, JS remplace juste le src -->
        <div class="plan-photo-wrap">
            <img id="cfg-photo" src="" alt="">
            <div class="plan-thumbs" id="plan-thumbs"></div>
        </div>

        <!-- Colonne formulaire — JS peuple le contenu de #plan-content -->
        <div class="plan-form-wrap">
            <div id="plan-content">
                <p class="text-pierre">Chargement…</p>
            </div>
        </div>

    </main>

    <footer>
        <div class="container">
            <div class="footer-inner">
                <span class="footer-logo">ZeBest <em>Custom</em></span>
                <ul class="footer-links">
                    <li><a href="index.html">Collection</a></li>
                    <li><a href="https://zebestcake.fr" target="_blank" rel="noopener">ZeBestCake</a></li>
                </ul>
                <p>&copy; 2026 ZeBest Custom</p>
            </div>
        </div>
    </footer>

    <script type="module" src="js/custom-plan.js?v=5"></script>

</body>
</html>
