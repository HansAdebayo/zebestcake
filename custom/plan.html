<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnalisation — ZeBest Custom</title>
    <meta name="description" content="Configurez votre objet personnalisé sur-mesure.">
    <link rel="stylesheet" href="css/custom.css?v=9">
    <style>
        /* ID selectors — priorité absolue sur tout CSS externe */

        #cfg-photo {
            width: 100%;
            max-height: 220px;     /* mobile : image compacte */
            object-fit: cover;
            display: block;
            position: static !important; /* force : annule tout sticky caché */
        }

        #plan-detail {
            display: block;
            padding-top: 3.6rem;
        }

        #cfg-form-wrap {
            padding: 1.5rem 1.25rem;
        }

        /* Desktop : grille 2 colonnes, image sticky */
        @media (min-width: 1024px) {
            #plan-detail {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 5rem;
                padding: 8rem 2rem 6rem;
                align-items: start;
            }
            #cfg-photo {
                max-height: none;
                aspect-ratio: 4 / 5;
                position: sticky;
                top: 5rem;
                align-self: start;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">ZeBest <em>Custom</em></a>
            <a href="commander.html" class="nav-cart" id="nav-cart" aria-label="Voir mon panier">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <path d="M16 10a4 4 0 01-8 0"/>
                </svg>
                <span class="cart-count" id="cart-count" data-count="0">0</span>
            </a>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="plan-detail" id="plan-detail">
                <p class="text-pierre">Chargement…</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-inner">
                <span class="footer-logo">ZeBest <em>Custom</em></span>
                <ul class="footer-links">
                    <li><a href="index.html">Collection</a></li>
                    <li><a href="https://zebestcake.fr" target="_blank" rel="noopener">ZeBestCake</a></li>
                </ul>
                <p>&copy; 2026 ZeBest Custom</p>
            </div>
        </div>
    </footer>

    <script type="module" src="js/custom-plan.js?v=3"></script>

</body>
</html>
