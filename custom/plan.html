<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnalisation — ZeBest Custom</title>
    <meta name="description" content="Configurez votre objet personnalisé sur-mesure.">
    <link rel="stylesheet" href="css/custom.css">
    <style>
        /* ===== PLAN PAGE LAYOUT — mobile first ===== */

        body { background: #fff; }

        .plan-page {
            min-height: 100dvh;
        }

        /* ---- COLONNE IMAGE ---- */
        .plan-photo-wrap {
            width: 100%;
            padding-top: 56px; /* navbar fixe */
            background: #f6f6f6;
        }

        #cfg-photo {
            display: block;
            width: 100%;
            height: 65vw;
            max-height: 420px;
            object-fit: cover;
            object-position: center;
        }

        .plan-thumbs {
            display: flex;
            gap: 6px;
            padding: 10px 1rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            background: #f6f6f6;
        }

        .plan-thumb {
            flex-shrink: 0;
            width: 54px;
            height: 54px;
            border: 2px solid transparent;
            cursor: pointer;
            background: none;
            padding: 0;
            overflow: hidden;
            transition: border-color 0.15s;
        }

        .plan-thumb.active { border-color: var(--terracotta); }

        .plan-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ---- COLONNE FORMULAIRE ---- */
        .plan-form-wrap {
            padding: 2rem 1.25rem 5rem;
        }

        .plan-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--pierre);
            margin-bottom: 2rem;
            transition: color 0.15s;
        }

        .plan-back:hover { color: var(--encre); }

        /* ---- DESKTOP ≥ 1024px : 2 colonnes collées ---- */
        @media (min-width: 1024px) {
            .plan-page {
                display: grid;
                grid-template-columns: 1fr 1fr;
                min-height: 100dvh;
            }

            .plan-photo-wrap {
                padding-top: 0;
                position: sticky;
                top: 0;
                height: 100dvh;
                display: flex;
                flex-direction: column;
            }

            #cfg-photo {
                flex: 1;
                height: 0;
                max-height: none;
                object-fit: cover;
            }

            .plan-thumbs {
                flex-shrink: 0;
                padding: 10px 1.25rem;
            }

            .plan-form-wrap {
                padding: 8rem 3.5rem 6rem;
                overflow-y: auto;
                max-height: 100dvh;
            }
        }
    </style>
</head>
<body>

    <header id="site-header" class="scrolled">
        <nav class="navbar">
            <a href="index.html" class="logo">ZeBest <em>Custom</em></a>
            <a href="commander.html" class="nav-cart" id="nav-cart" aria-label="Voir mon panier">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <path d="M16 10a4 4 0 01-8 0"/>
                </svg>
                <span class="cart-count" id="cart-count" data-count="0">0</span>
            </a>
        </nav>
    </header>

    <main class="plan-page">

        <!-- Colonne image — JS peuple #cfg-photo et #plan-thumbs -->
        <div class="plan-photo-wrap">
            <img id="cfg-photo" src="" alt="">
            <div class="plan-thumbs" id="plan-thumbs"></div>
        </div>

        <!-- Colonne formulaire — JS peuple #plan-content -->
        <div class="plan-form-wrap">
            <a href="index.html?picker=1#catalogue" class="plan-back">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M19 12H5M12 5l-7 7 7 7"/>
                </svg>
                Choisir un autre modèle
            </a>
            <div id="plan-content">
                <p class="text-pierre">Chargement…</p>
            </div>
        </div>

    </main>

    <script type="module" src="js/custom-plan.js"></script>

</body>
</html>
