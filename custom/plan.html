<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnalisation — ZeBest Custom</title>
    <meta name="description" content="Configurez votre objet personnalisé sur-mesure.">
    <link rel="stylesheet" href="css/custom.css?v=7">
    <style>
        /*
         * Layout du configurateur — inline pour immunité au cache CSS.
         *
         * Stratégie : hover:none cible tous les appareils tactiles
         * (téléphones et tablettes), quelle que soit leur largeur d'écran.
         * hover:hover + min-width cible les vrais desktops avec souris.
         */

        /* ---- Base commune ---- */
        .plan-detail {
            display: flex;
            flex-direction: column;
            padding-top: 3.6rem;
            gap: 0;
        }
        .plan-main-image {
            width: 100%;
            overflow: hidden;
            background: #E0D6C8;
        }
        .plan-main-image img {
            width: 100%;
            display: block;
            object-fit: cover;
        }
        .plan-gallery { position: static; }

        /* ---- Appareils tactiles (téléphones + tablettes) ---- */
        @media (hover: none) {
            .plan-main-image {
                height: 220px;   /* hauteur fixe, image compacte */
            }
            .plan-main-image img {
                height: 100%;
            }
            .plan-thumbs {
                display: none;   /* miniatures cachées */
            }
            .plan-configurator {
                padding: 1.75rem 1.25rem 5.5rem;
            }
            .plan-submit-btn {
                display: block;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                z-index: 50;
                border-radius: 0;
                padding: 1.1rem;
                text-align: center;
                margin: 0;
            }
        }

        /* ---- Desktop : souris + écran large ---- */
        @media (hover: hover) and (min-width: 1024px) {
            .plan-detail {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 5rem;
                padding: 8rem 0 6rem;
                align-items: start;
            }
            .plan-gallery {
                position: sticky;
                top: 5rem;
                align-self: start;
            }
            .plan-main-image {
                height: auto;
                aspect-ratio: 4 / 5;
            }
            .plan-main-image img {
                height: 100%;
            }
            .plan-thumbs {
                display: flex;
                gap: 0.5rem;
                margin-top: 0.75rem;
                flex-wrap: wrap;
            }
            .plan-configurator {
                padding: 0;
            }
            .plan-submit-btn {
                position: static;
                display: block;
                width: 100%;
                margin-top: 1.5rem;
                border-radius: 0;
                padding: 0.85rem 1.75rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">ZeBest <em>Custom</em></a>
            <a href="commander.html" class="nav-cart" id="nav-cart" aria-label="Voir mon panier">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <path d="M16 10a4 4 0 01-8 0"/>
                </svg>
                <span class="cart-count" id="cart-count" data-count="0">0</span>
            </a>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="plan-detail" id="plan-detail">
                <p class="text-pierre">Chargement…</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-inner">
                <span class="footer-logo">ZeBest <em>Custom</em></span>
                <ul class="footer-links">
                    <li><a href="index.html">Collection</a></li>
                    <li><a href="https://zebestcake.fr" target="_blank" rel="noopener">ZeBestCake</a></li>
                </ul>
                <p>&copy; 2026 ZeBest Custom</p>
            </div>
        </div>
    </footer>

    <script type="module" src="js/custom-plan.js"></script>

</body>
</html>
