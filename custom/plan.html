<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnalisation — ZeBest Custom</title>
    <meta name="description" content="Configurez votre objet personnalisé sur-mesure.">
    <link rel="stylesheet" href="css/custom.css?v=6">
    <style>
        /* CSS critique inline — appliqué même si custom.css est mis en cache */
        @media (max-width: 767px) {
            .plan-detail {
                display: flex;
                flex-direction: column;
                padding-top: 3.6rem;
                gap: 0;
            }
            .plan-main-image {
                width: 100%;
                height: 220px;
                overflow: hidden;
            }
            .plan-main-image img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }
            .plan-thumbs {
                display: none;
            }
            .plan-configurator {
                padding: 1.75rem 1.25rem 5.5rem;
            }
            .plan-submit-btn {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                z-index: 50;
                border-radius: 0;
                padding: 1.1rem;
                text-align: center;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">ZeBest <em>Custom</em></a>
            <a href="commander.html" class="nav-cart" id="nav-cart" aria-label="Voir mon panier">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <path d="M16 10a4 4 0 01-8 0"/>
                </svg>
                <span class="cart-count" id="cart-count" data-count="0">0</span>
            </a>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="plan-detail" id="plan-detail">
                <p class="text-pierre">Chargement…</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-inner">
                <span class="footer-logo">ZeBest <em>Custom</em></span>
                <ul class="footer-links">
                    <li><a href="index.html">Collection</a></li>
                    <li><a href="https://zebestcake.fr" target="_blank" rel="noopener">ZeBestCake</a></li>
                </ul>
                <p>&copy; 2026 ZeBest Custom</p>
            </div>
        </div>
    </footer>

    <script type="module" src="js/custom-plan.js"></script>

</body>
</html>
