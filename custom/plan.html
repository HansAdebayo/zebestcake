<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnalisation — ZeBest Custom</title>
    <meta name="description" content="Configurez votre objet personnalisé sur-mesure.">
    <link rel="stylesheet" href="css/custom.css?v=10">
    <style>
        /* ===== PAGE PLAN — MOBILE FIRST ===== */

        /*
         * Mobile (défaut) :
         *   - #plan-detail = block simple
         *   - #cfg-photo   = image pleine largeur, hauteur fixe
         *   - #cfg-form-wrap = bloc de texte sous l'image
         * Les deux enfants s'empilent naturellement (flow normal).
         */

        #plan-detail {
            display: block;
            padding-top: 56px; /* hauteur navbar fixe */
        }

        #cfg-photo {
            display: block;
            width: 100%;
            height: 70vw;
            max-height: 420px;
            object-fit: cover;
            object-position: center top;
        }

        #cfg-form-wrap {
            display: block;
            padding: 1.5rem 1.25rem 5rem;
        }

        /* Desktop ≥ 1024px : grille 2 colonnes, image sticky */
        @media (min-width: 1024px) {
            #plan-detail {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 0;
                padding-top: 0;
                align-items: start;
            }

            #cfg-photo {
                height: 100vh;
                max-height: none;
                position: sticky;
                top: 0;
                align-self: start;
            }

            #cfg-form-wrap {
                padding: 8rem 3rem 6rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">ZeBest <em>Custom</em></a>
            <a href="commander.html" class="nav-cart" id="nav-cart" aria-label="Voir mon panier">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <path d="M16 10a4 4 0 01-8 0"/>
                </svg>
                <span class="cart-count" id="cart-count" data-count="0">0</span>
            </a>
        </nav>
    </header>

    <main>
        <!-- Pas de .container : l'image doit être pleine largeur sur mobile -->
        <div id="plan-detail">
            <p class="text-pierre">Chargement…</p>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-inner">
                <span class="footer-logo">ZeBest <em>Custom</em></span>
                <ul class="footer-links">
                    <li><a href="index.html">Collection</a></li>
                    <li><a href="https://zebestcake.fr" target="_blank" rel="noopener">ZeBestCake</a></li>
                </ul>
                <p>&copy; 2026 ZeBest Custom</p>
            </div>
        </div>
    </footer>

    <script type="module" src="js/custom-plan.js?v=4"></script>

</body>
</html>
