<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votre Panier | ZeBest Custom</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">ZEBEST <span>CUSTOM</span></div>
            <nav>
                <ul>
                    <li><a href="index.html">Collection</a></li>
                    <li><a href="atelier.html">L'Atelier</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section>
            <div class="container">
                <div class="section-title">
                    <h1>Votre Panier</h1>
                </div>

                <div class="cart-container" style="max-width: 800px; margin: 0 auto;">
                    <div id="cart-items-list">
                        <!-- Chargé dynamiquement -->
                        <p class="loading">Votre panier est vide.</p>
                    </div>

                    <!-- Checkout Form (Hidden if cart empty) -->
                    <div id="checkout-section" style="display: none; margin-top: 60px; padding-top: 40px; border-top: 1px solid var(--ligne);">
                        <h2 style="font-family: var(--font-title); margin-bottom: 30px;">Finaliser ma demande</h2>
                        <form id="checkout-form">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                                <div class="form-group">
                                    <label for="first-name">Prénom</label>
                                    <input type="text" id="first-name" required>
                                </div>
                                <div class="form-group">
                                    <label for="last-name">Nom</label>
                                    <input type="text" id="last-name" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" required>
                            </div>
                            <div class="form-group">
                                <label for="phone">Téléphone</label>
                                <input type="tel" id="phone" required>
                            </div>
                            
                            <div class="cart-summary" style="margin-top: 40px; text-align: right;">
                                <p style="font-size: 18px; margin-bottom: 20px;">Total : <strong id="cart-total">0,00 €</strong></p>
                                <button type="submit" class="btn">Envoyer ma commande</button>
                                <p style="margin-top: 15px; font-size: 12px; color: var(--pierre);">Le paiement et la validation finale se feront par téléphone.</p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 ZeBest Custom. Un atelier créatif par ZeBestCake.</p>
        </div>
    </footer>

    <script type="module" src="js/cart.js"></script>
</body>
</html>
