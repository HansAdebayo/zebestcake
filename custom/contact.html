<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | ZeBest Custom</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">ZEBEST <span>CUSTOM</span></div>
            <nav>
                <ul>
                    <li><a href="index.html">Collection</a></li>
                    <li><a href="atelier.html">L'Atelier</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section>
            <div class="container">
                <div class="section-title">
                    <h2>Contactez l'Atelier</h2>
                    <p>Une question ? Un projet spécifique de personnalisation ?</p>
                </div>

                <div style="max-width: 600px; margin: 0 auto;">
                    <form id="contact-form">
                        <div class="form-group">
                            <label for="name">Nom complet</label>
                            <input type="text" id="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="text" id="email" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Votre message</label>
                            <textarea id="message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn" style="width: 100%;">Envoyer le message</button>
                    </form>

                    <div style="margin-top: 40px; text-align: center; color: var(--pierre);">
                        <p>Retrouvez-nous également via la pâtisserie ZeBestCake.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 ZeBest Custom. Un atelier créatif par ZeBestCake.</p>
        </div>
    </footer>

</body>
</html>
